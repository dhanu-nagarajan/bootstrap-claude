name: 'bootstrap-claude Audit'
description: 'Run bootstrap-claude standards compliance audit on pull requests'
author: 'bootstrap-claude'

inputs:
  threshold:
    description: 'Minimum compliance score (0-100) to pass'
    required: false
    default: '70'
  claude-api-key:
    description: 'Anthropic API key for Claude analysis'
    required: true
  plugin-path:
    description: 'Path to bootstrap-claude plugin (or will install from marketplace)'
    required: false
    default: ''
  standards-path:
    description: 'Path to .claude/ standards directory'
    required: false
    default: '.claude'
  post-comment:
    description: 'Post audit results as PR comment'
    required: false
    default: 'true'

outputs:
  score:
    description: 'Compliance score (0-100)'
  pass:
    description: 'Whether the score meets the threshold (true/false)'
  report:
    description: 'Path to the generated audit report'
  violations-critical:
    description: 'Number of critical violations'
  violations-warning:
    description: 'Number of warning violations'

runs:
  using: 'composite'
  steps:
    - name: Check prerequisites
      shell: bash
      run: |
        echo "Checking for .claude/ standards directory..."
        if [ ! -d "${{ inputs.standards-path }}" ]; then
          echo "::error::No .claude/ standards directory found. Run /bootstrap first."
          exit 1
        fi
        echo "Standards directory found at ${{ inputs.standards-path }}"

    - name: Run audit
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.claude-api-key }}
      run: |
        echo "Running bootstrap-claude audit..."
        echo "Threshold: ${{ inputs.threshold }}"
        # Audit implementation would use Claude API to analyze
        # codebase against .claude/standards/ files
        # Output JSON report to audit-results.json
        echo "Audit complete."

    - name: Parse results
      shell: bash
      id: parse
      run: |
        if [ -f "audit-results.json" ]; then
          score=$(jq -r '.compliance_score' audit-results.json)
          pass=$(jq -r '.pass' audit-results.json)
          critical=$(jq -r '.summary.critical' audit-results.json)
          warning=$(jq -r '.summary.warning' audit-results.json)
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "pass=$pass" >> $GITHUB_OUTPUT
          echo "violations-critical=$critical" >> $GITHUB_OUTPUT
          echo "violations-warning=$warning" >> $GITHUB_OUTPUT
          echo "report=audit-results.json" >> $GITHUB_OUTPUT
        fi

    - name: Post PR comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ -f "audit-results.json" ]; then
          score=$(jq -r '.compliance_score' audit-results.json)
          critical=$(jq -r '.summary.critical' audit-results.json)
          warning=$(jq -r '.summary.warning' audit-results.json)
          info=$(jq -r '.summary.info' audit-results.json)
          pass=$(jq -r '.pass' audit-results.json)

          if [ "$pass" = "true" ]; then
            status="Passed"
            icon="white_check_mark"
          else
            status="Failed"
            icon="x"
          fi

          body="## :${icon}: Audit ${status}

        **Score: ${score}/100** (threshold: ${{ inputs.threshold }})

        | Severity | Count |
        |----------|-------|
        | Critical | ${critical} |
        | Warning | ${warning} |
        | Info | ${info} |

        ---
        *Generated by [bootstrap-claude](https://github.com/dhanu-nagarajan/bootstrap-claude) \`/audit\`*"

          gh pr comment ${{ github.event.pull_request.number }} --body "$body"
        fi

    - name: Check threshold
      shell: bash
      run: |
        if [ -f "audit-results.json" ]; then
          pass=$(jq -r '.pass' audit-results.json)
          if [ "$pass" = "false" ]; then
            score=$(jq -r '.compliance_score' audit-results.json)
            echo "::error::Compliance score ${score} is below threshold ${{ inputs.threshold }}"
            exit 1
          fi
        fi
